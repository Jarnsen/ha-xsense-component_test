# .github/release-drafter.yml

template: |
  ## What's Changed

  $CHANGES

categories:
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Bug Fixes
    labels:
      - bug
      - bugfix
  - title: Maintenance
    labels:
      - maintenance
      - refactor
  - title: Infrastructure
    labels:
      - infrastructure
      - ci
  - title: Security
    labels:
      - security
      - vulnerability
  - title: Dependencies
    labels:
      - dependencies
      - dependency-update

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
no-changes-template: 'No changes'

tag-prefix: 'v.'
version-template: '$MAJOR.$MINOR.$PATCH'
tag-template: 'v.$RESOLVED_VERSION'
name-template: 'Release v.$RESOLVED_VERSION'

exclude-labels:
  - 'wontfix'
  - 'invalid'

contributors:
  enabled: true
  only-merges: true
