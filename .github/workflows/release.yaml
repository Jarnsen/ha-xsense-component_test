# .github/workflows/release.yaml

name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
