# .github/workflows/release.yaml

name: Create Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          notes_file=".github/release-notes/${tag}.md"
          version_notes_file=".github/release-notes/${tag#v}.md"
          title="${tag}"

          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([.][0-9]+)?$ ]]; then
            echo "Release tags must use vX.Y.Z or vX.Y.Z.N format."
            exit 1
          fi

          release_args=(--verify-tag --title "$title")
          version="${tag#v}"

          manifest_version="$(jq -r '.version' custom_components/xsense/manifest.json)"
          if [[ "$manifest_version" != "$version" ]]; then
            echo "Manifest version ${manifest_version} does not match tag version ${version}."
            exit 1
          fi

          IFS='.' read -r -a version_parts <<< "$version"
          if (( ${#version_parts[@]} >= 4 )); then
            release_args+=(--prerelease)
          fi

          if [[ ! -f "$notes_file" && -f "$version_notes_file" ]]; then
            notes_file="$version_notes_file"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            args=("${release_args[@]}" --draft=false)
            if [[ -f "$notes_file" ]]; then
              args+=(--notes-file "$notes_file")
            fi
            gh release edit "$tag" "${args[@]}"
            exit 0
          fi

          if [[ -f "$notes_file" ]]; then
            gh release create "$tag" "${release_args[@]}" --notes-file "$notes_file"
          else
            gh release create "$tag" "${release_args[@]}" --generate-notes
          fi
