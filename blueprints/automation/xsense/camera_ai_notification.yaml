blueprint:
  name: X-Sense Camera Event
  description: >
    Send a notification or run actions when an X-Sense camera reports motion
    or AI detection. Select the camera Motion or AI Detection event entity,
    then keep the defaults or adjust the actions.
  domain: automation
  author: X-Sense Home Security
  homeassistant:
    min_version: 2025.3.0
  input:
    ai_detection_event:
      name: Camera event
      description: Select the Motion or AI Detection event entity for the camera.
      selector:
        entity:
          filter:
            - integration: xsense
              domain: event
    event_types:
      name: Event types
      description: Leave all selected to notify for every camera event, or choose only the types you want.
      default:
        - motion
        - person
        - pet
        - vehicle
        - vehicle_enter
        - vehicle_out
        - vehicle_held_up
        - package
        - package_drop_off
        - package_pick_up
        - package_exist
        - other
        - ai_detection
      selector:
        select:
          multiple: true
          options:
            - label: Motion
              value: motion
            - label: Person
              value: person
            - label: Pet
              value: pet
            - label: Vehicle
              value: vehicle
            - label: Vehicle entered
              value: vehicle_enter
            - label: Vehicle exited
              value: vehicle_out
            - label: Vehicle held up
              value: vehicle_held_up
            - label: Package
              value: package
            - label: Package drop-off
              value: package_drop_off
            - label: Package pick-up
              value: package_pick_up
            - label: Package present
              value: package_exist
            - label: Other
              value: other
            - label: Multiple objects
              value: ai_detection
    actions:
      name: What should happen
      description: The default sends a basic Home Assistant notification. Replace it with a mobile notification or any other actions you want.
      default:
        - action: notify.notify
          data:
            message: X-Sense camera activity detected.
      selector:
        action:

triggers:
  - trigger: event.received
    target:
      entity_id: !input ai_detection_event
    options:
      event_type: !input event_types

actions: !input actions

mode: queued
max: 10
