blueprint:
  name: X-Sense Camera Event
  description: >
    Send a notification after an X-Sense camera reports motion or AI
    detection. Select the camera Motion or AI Detection event entity.
    Motion events expose recording_url when playback metadata is available and
    recording_media_url when the clip has been cached.
    For best recording playback results, enable X-Sense Recording media sync in
    the integration options. The integration keeps a broad background catch-up
    sync for older clips, checks for recent clips every couple minutes, and
    immediately tries to download motion or AI event recordings before firing
    this notification. The default notification opens the X-Sense Recordings
    panel link instead of attaching video, which keeps mobile push delivery
    reliable across Companion app platforms.
  domain: automation
  author: X-Sense Home Security
  source_url: https://github.com/Jarnsen/ha-xsense-component_test/blob/main/blueprints/automation/xsense/camera_ai_notification.yaml
  homeassistant:
    min_version: 2025.3.0
  input:
    ai_detection_event:
      name: Camera event
      description: Select the camera Motion event entity, or AI Detection when it is available for a subscribed camera.
      selector:
        entity:
          filter:
            - integration: xsense
              domain: event
    include_recording_link:
      name: Include recording link
      description: Send the notification when a real recording link is available. Manual runs use the selected event entity's latest recording data.
      default: true
      selector:
        boolean:
    include_snapshot_link:
      name: Include snapshot link
      description: Add the snapshot URL to the default notification when a Motion event includes one.
      default: false
      selector:
        boolean:
    notify_device:
      name: Mobile device
      description: Select the Home Assistant Companion app device that should receive the default notification.
      selector:
        device:
          integration: mobile_app
triggers:
  - trigger: event
    event_type: xsense_camera_event

variables:
  xsense_blueprint_version: 5
  xsense_event_entity: !input ai_detection_event
  xsense_include_recording_link: !input include_recording_link
  xsense_include_snapshot_link: !input include_snapshot_link
  xsense_event_data: "{{ trigger.event.data if trigger is defined and trigger.event is defined and trigger.event.data is mapping else {} }}"
  xsense_event_type: "{{ (xsense_event_data.get('event_type') if xsense_event_data is mapping else '') or state_attr(xsense_event_entity, 'event_type') or (trigger.event.event_type if trigger is defined and trigger.event is defined else '') }}"
  xsense_camera_name: "{{ (xsense_event_data.get('camera_name') if xsense_event_data is mapping else '') or state_attr(xsense_event_entity, 'camera_name') or (trigger.to_state.name if trigger is defined and trigger.to_state is defined else state_attr(xsense_event_entity, 'friendly_name') or 'X-Sense camera') }}"
  xsense_event_entity_id: "{{ xsense_event_data.get('event_entity_id') if xsense_event_data is mapping else '' }}"
  xsense_recording_url: "{{ (xsense_event_data.get('recording_url') if xsense_event_data is mapping else '') or state_attr(xsense_event_entity, 'recording_url') or '' }}"
  xsense_recording_media_url: "{{ (xsense_event_data.get('recording_media_url') if xsense_event_data is mapping else '') or state_attr(xsense_event_entity, 'recording_media_url') or '' }}"
  xsense_recording_tap_url: "{{ xsense_recording_url if xsense_recording_url == '/xsense-recordings' or xsense_recording_url[0:19] == '/xsense-recordings#' else '' }}"
  xsense_notification_url: "{{ xsense_recording_tap_url or '/xsense-recordings' }}"
  xsense_snapshot_url: "{{ (xsense_event_data.get('snapshot_url') if xsense_event_data is mapping else '') or state_attr(xsense_event_entity, 'snapshot_url') or '' }}"

actions:
  - condition: template
    value_template: "{{ not xsense_event_entity_id or xsense_event_entity_id == xsense_event_entity }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ xsense_include_recording_link }}"
        sequence:
          - domain: mobile_app
            type: notify
            device_id: !input notify_device
            title: "{{ xsense_camera_name }}"
            message: >-
              Motion detected by {{ xsense_camera_name }}.{% if xsense_recording_tap_url %} Recording ready.{% else %} Open X-Sense Recordings to view recent clips.{% endif %}{% if xsense_include_snapshot_link and xsense_snapshot_url %}
              Snapshot: {{ xsense_snapshot_url }}{% endif %}
            data:
              url: "{{ xsense_notification_url }}"
              clickAction: "{{ xsense_notification_url }}"
    default:
      - domain: mobile_app
        type: notify
        device_id: !input notify_device
        title: "{{ xsense_camera_name }}"
        message: >-
          Motion detected by {{ xsense_camera_name }}.{% if xsense_include_snapshot_link and xsense_snapshot_url %}
          Snapshot: {{ xsense_snapshot_url }}{% endif %}

mode: queued
max: 10
