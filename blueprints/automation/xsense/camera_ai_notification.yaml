blueprint:
  name: X-Sense Camera Event
  description: >
    Send a notification or run actions when an X-Sense camera reports motion
    or AI detection. Select the camera Motion or AI Detection event entity.
    Motion events include trigger.event.data.recording_url only when X-Sense
    provides a playback URL for the recording. SD-card playback records use a
    Home Assistant playback URL generated by the X-Sense integration.
  domain: automation
  author: X-Sense Home Security
  source_url: https://github.com/Jarnsen/ha-xsense-component_test/blob/main/blueprints/automation/xsense/camera_ai_notification.yaml
  homeassistant:
    min_version: 2025.3.0
  input:
    ai_detection_event:
      name: Camera event
      description: Select the camera Motion event entity, or AI Detection when it is available for a subscribed camera.
      selector:
        entity:
          filter:
            - integration: xsense
              domain: event
    include_recording_link:
      name: Include recording link
      description: Add the recording URL to the default notification when a Motion event includes one.
      default: true
      selector:
        boolean:
    include_snapshot_link:
      name: Include snapshot link
      description: Add the snapshot URL to the default notification when a Motion event includes one.
      default: false
      selector:
        boolean:
    notify_device:
      name: Mobile device
      description: Select the Home Assistant Companion app device that should receive the default notification.
      selector:
        device:
          integration: mobile_app
triggers:
  - trigger: event.received
    target:
      entity_id: !input ai_detection_event
    options:
      event_type:
        - motion
        - ai_detection
        - person
        - pet
        - vehicle
        - vehicle_enter
        - vehicle_out
        - vehicle_held_up
        - package
        - package_drop_off
        - package_pick_up
        - package_exist
        - other

variables:
  xsense_include_recording_link: !input include_recording_link
  xsense_include_snapshot_link: !input include_snapshot_link
  xsense_event_data: "{{ trigger.to_state.attributes if trigger is defined and trigger.to_state is defined and trigger.to_state.attributes is mapping else (trigger.event.data if trigger is defined and trigger.event is defined and trigger.event.data is mapping else {}) }}"
  xsense_event_type: "{{ xsense_event_data.get('event_type') or (trigger.event.event_type if trigger is defined and trigger.event is defined else '') }}"
  xsense_camera_name: "{{ xsense_event_data.get('camera_name') or (trigger.to_state.name if trigger is defined and trigger.to_state is defined else 'X-Sense camera') }}"
  xsense_recording_url: "{{ xsense_event_data.get('recording_url', '') }}"
  xsense_snapshot_url: "{{ xsense_event_data.get('snapshot_url', '') }}"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ xsense_include_recording_link and xsense_recording_url }}"
        sequence:
          - domain: mobile_app
            type: notify
            device_id: !input notify_device
            title: "{{ xsense_camera_name }}"
            message: >-
              Motion detected by {{ xsense_camera_name }}.
              Recording: {{ xsense_recording_url }}{% if xsense_include_snapshot_link and xsense_snapshot_url %}
              Snapshot: {{ xsense_snapshot_url }}{% endif %}
            data:
              url: "{{ xsense_recording_url }}"
              clickAction: "{{ xsense_recording_url }}"
    default:
      - domain: mobile_app
        type: notify
        device_id: !input notify_device
        title: "{{ xsense_camera_name }}"
        message: >-
          Motion detected by {{ xsense_camera_name }}.{% if xsense_include_snapshot_link and xsense_snapshot_url %}
          Snapshot: {{ xsense_snapshot_url }}{% endif %}

mode: queued
max: 10
