blueprint:
  name: X-Sense Camera Event
  description: >
    Send a notification or run actions when an X-Sense camera reports motion
    or AI detection. Select the camera Motion or AI Detection event entity,
    then keep the default notification action or replace it with your own.
    Motion events include trigger.event.data.recording_url when X-Sense
    provides a direct playback URL for the recording. When a recording URL is
    available, tapping the default mobile notification opens that recording.
  domain: automation
  author: X-Sense Home Security
  source_url: https://github.com/Jarnsen/ha-xsense-component_test/blob/main/blueprints/automation/xsense/camera_ai_notification.yaml
  homeassistant:
    min_version: 2025.3.0
  input:
    ai_detection_event:
      name: Camera event
      description: Select the camera Motion event entity, or AI Detection when it is available for a subscribed camera.
      selector:
        entity:
          filter:
            - integration: xsense
              domain: event
    include_recording_link:
      name: Include recording link
      description: Add the recording URL to the default notification when a Motion event includes one.
      default: true
      selector:
        boolean:
    include_snapshot_link:
      name: Include snapshot link
      description: Add the snapshot URL to the default notification when a Motion event includes one.
      default: false
      selector:
        boolean:
    notify_device:
      name: Mobile device
      description: Select the Home Assistant Companion app device that should receive the default notification.
      selector:
        device:
          integration: mobile_app
    actions:
      name: Extra actions
      description: Optional actions to run after the default mobile app notification. These actions can use xsense_event_type, xsense_recording_url, xsense_snapshot_url, and xsense_notification_url.
      default: []
      selector:
        action:

triggers:
  - trigger: event.received
    target:
      entity_id: !input ai_detection_event
    options:
      event_type:
        - motion
        - ai_detection
        - person
        - pet
        - vehicle
        - vehicle_enter
        - vehicle_out
        - vehicle_held_up
        - package
        - package_drop_off
        - package_pick_up
        - package_exist
        - other

variables:
  xsense_include_recording_link: !input include_recording_link
  xsense_include_snapshot_link: !input include_snapshot_link
  xsense_event_data: "{{ trigger.event.data if trigger is defined and trigger.event is defined and trigger.event.data is mapping else {} }}"
  xsense_event_type: "{{ trigger.event.event_type if trigger is defined and trigger.event is defined else '' }}"
  xsense_recording_url: "{{ xsense_event_data.get('recording_url', '') }}"
  xsense_snapshot_url: "{{ xsense_event_data.get('snapshot_url', '') }}"
  xsense_notification_url: "{{ xsense_recording_url if xsense_include_recording_link and xsense_recording_url else 'noAction' }}"

actions:
  - domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: X-Sense camera
    message: >-
      X-Sense camera activity detected.{% if xsense_include_recording_link and xsense_recording_url %}
      Recording: {{ xsense_recording_url }}{% endif %}{% if xsense_include_snapshot_link and xsense_snapshot_url %}
      Snapshot: {{ xsense_snapshot_url }}{% endif %}
    data:
      url: "{{ xsense_notification_url }}"
      clickAction: "{{ xsense_notification_url }}"
      actions:
        - action: URI
          title: View recording
          uri: "{{ xsense_notification_url }}"
  - choose: []
    default: !input actions

mode: queued
max: 10
