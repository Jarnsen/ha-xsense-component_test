blueprint:
  name: X-Sense Camera Event
  description: >
    Send a notification or run actions when an X-Sense camera reports motion
    or AI detection. Select the camera Motion or AI Detection event entity,
    then keep the default notification action or replace it with your own.
  domain: automation
  author: X-Sense Home Security
  homeassistant:
    min_version: 2025.3.0
  input:
    ai_detection_event:
      name: Camera event
      description: Select the camera Motion event entity, or AI Detection when it is available for a subscribed camera.
      selector:
        entity:
          filter:
            - integration: xsense
              domain: event
    actions:
      name: What should happen
      description: The default sends a basic Home Assistant notification. Replace it with a working mobile notification target or any other actions you want.
      default:
        - action: notify.notify
          data:
            message: X-Sense camera activity detected.
      selector:
        action:

triggers:
  - trigger: event.received
    target:
      entity_id: !input ai_detection_event
    options:
      event_type:
        - motion
        - ai_detection
        - person
        - pet
        - vehicle
        - vehicle_enter
        - vehicle_out
        - vehicle_held_up
        - package
        - package_drop_off
        - package_pick_up
        - package_exist
        - other

actions: !input actions

mode: queued
max: 10
