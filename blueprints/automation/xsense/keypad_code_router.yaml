blueprint:
  name: X-Sense Keypad Code Router
  description: >
    Route submitted SKP0A keypad codes to different Home Assistant actions.
    X-Sense only publishes a keypad event after a valid app-created code is
    submitted with Home, Away, or Disarmed. Individual key presses are not
    published by X-Sense.
  domain: automation
  author: X-Sense Home Security
  source_url: https://github.com/Jarnsen/ha-xsense-component_test/blob/main/blueprints/automation/xsense/keypad_code_router.yaml
  homeassistant:
    min_version: 2025.3.0
  input:
    keypad_device_sn:
      name: Keypad device serial
      description: Optional. Leave empty to accept codes from any SKP0A keypad.
      default: ""
      selector:
        text:
    code_1:
      name: Code 1
      default: ""
      selector:
        text:
    mode_button_1:
      name: Code 1 mode button
      default: Any
      selector:
        select:
          options: [Any, Home, Away, Disarmed]
    actions_1:
      name: Code 1 actions
      default: []
      selector:
        action:
    code_2:
      name: Code 2
      default: ""
      selector:
        text:
    mode_button_2:
      name: Code 2 mode button
      default: Any
      selector:
        select:
          options: [Any, Home, Away, Disarmed]
    actions_2:
      name: Code 2 actions
      default: []
      selector:
        action:
    code_3:
      name: Code 3
      default: ""
      selector:
        text:
    mode_button_3:
      name: Code 3 mode button
      default: Any
      selector:
        select:
          options: [Any, Home, Away, Disarmed]
    actions_3:
      name: Code 3 actions
      default: []
      selector:
        action:
    code_4:
      name: Code 4
      default: ""
      selector:
        text:
    mode_button_4:
      name: Code 4 mode button
      default: Any
      selector:
        select:
          options: [Any, Home, Away, Disarmed]
    actions_4:
      name: Code 4 actions
      default: []
      selector:
        action:
    code_5:
      name: Code 5
      default: ""
      selector:
        text:
    mode_button_5:
      name: Code 5 mode button
      default: Any
      selector:
        select:
          options: [Any, Home, Away, Disarmed]
    actions_5:
      name: Code 5 actions
      default: []
      selector:
        action:

triggers:
  - trigger: event
    event_type: xsense_keypad_code

variables:
  xsense_blueprint_version: 1
  xsense_expected_keypad: !input keypad_device_sn
  xsense_event_data: "{{ trigger.event.data if trigger is defined and trigger.event is defined and trigger.event.data is mapping else {} }}"
  xsense_keypad_code: "{{ xsense_event_data.get('keypad_code') if xsense_event_data is mapping else none }}"
  xsense_mode_button: "{{ (xsense_event_data.get('mode_button') or xsense_event_data.get('safe_mode_aim')) if xsense_event_data is mapping else none }}"
  xsense_keypad_device_sn: "{{ xsense_event_data.get('device_sn') if xsense_event_data is mapping else none }}"
  xsense_code_1: !input code_1
  xsense_mode_1: !input mode_button_1
  xsense_code_2: !input code_2
  xsense_mode_2: !input mode_button_2
  xsense_code_3: !input code_3
  xsense_mode_3: !input mode_button_3
  xsense_code_4: !input code_4
  xsense_mode_4: !input mode_button_4
  xsense_code_5: !input code_5
  xsense_mode_5: !input mode_button_5

conditions:
  - condition: template
    value_template: "{{ not xsense_expected_keypad or xsense_keypad_device_sn == xsense_expected_keypad }}"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ xsense_code_1 | string | length > 0 and xsense_keypad_code | string == xsense_code_1 | string and (xsense_mode_1 == 'Any' or xsense_mode_button == xsense_mode_1) }}"
        sequence: !input actions_1
      - conditions:
          - condition: template
            value_template: "{{ xsense_code_2 | string | length > 0 and xsense_keypad_code | string == xsense_code_2 | string and (xsense_mode_2 == 'Any' or xsense_mode_button == xsense_mode_2) }}"
        sequence: !input actions_2
      - conditions:
          - condition: template
            value_template: "{{ xsense_code_3 | string | length > 0 and xsense_keypad_code | string == xsense_code_3 | string and (xsense_mode_3 == 'Any' or xsense_mode_button == xsense_mode_3) }}"
        sequence: !input actions_3
      - conditions:
          - condition: template
            value_template: "{{ xsense_code_4 | string | length > 0 and xsense_keypad_code | string == xsense_code_4 | string and (xsense_mode_4 == 'Any' or xsense_mode_button == xsense_mode_4) }}"
        sequence: !input actions_4
      - conditions:
          - condition: template
            value_template: "{{ xsense_code_5 | string | length > 0 and xsense_keypad_code | string == xsense_code_5 | string and (xsense_mode_5 == 'Any' or xsense_mode_button == xsense_mode_5) }}"
        sequence: !input actions_5

mode: queued
max: 10
